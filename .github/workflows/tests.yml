name: tests

# Runs the offline test suite on every push / PR. The suite stubs the network
# (no ORS/Open-Meteo/Overpass calls), so it's fast and deterministic on CI.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"   # builds pyproject + installs runtime + pytest

      - name: Run tests
        run: pytest
